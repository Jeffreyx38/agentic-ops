directory:
  - terraform/

framework:
  - terraform

skip-check:
  # CKV_AWS_144: S3 cross-region replication — optional, handled per-module when required
  - CKV_AWS_144
  # CKV2_AWS_62: S3 event notifications — applications use SQS/SNS explicitly
  - CKV2_AWS_62
  # CKV_AWS_18: S3 access logging — handled at org level via CloudTrail
  - CKV_AWS_18

output:
  - github_failed_only

soft-fail: false
compact: true
download-external-modules: false
