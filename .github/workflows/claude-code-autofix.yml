name: Claude Code Auto-fix

# Fires when Terraform CI fails on a PR.
# Claude reads the logs, diagnoses root cause, pushes a fix.
#
# SAFEGUARD LAYERS:
#   1. --max-turns 10        hard cap per session
#   2. concurrency lock      one session per PR, cancel-in-progress
#   3. attempt counter       stops after attempt 2, escalates to human
#   4. error class blocklist unfixable errors trigger escalation, not a fix

on:
  workflow_run:
    workflows: ["Terraform CI"]
    types: [completed]
  workflow_dispatch:

# SAFEGUARD 2: one auto-fix session per PR — cancel if one is already running
concurrency:
  group: claude-autofix-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  auto-fix:
    name: Auto-fix CI failure
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null

    steps:
      # SAFEGUARD: skip if no-autofix label is set on the PR
      - name: Check no-autofix label
        id: check-label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.workflow_run.pull_requests[0].number }}"
          LABELS=$(gh pr view "$PR_NUM" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "no-autofix"; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: no-autofix label found on PR #$PR_NUM"
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      # SAFEGUARD: skip if [skip-autofix] in commit message
      - name: Check skip-autofix commit message
        id: check-commit
        if: steps.check-label.outputs.SKIP != 'true'
        run: |
          COMMIT_MSG="${{ github.event.workflow_run.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -q "\[skip-autofix\]"; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Terraform
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Setup TFLint
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint plugins
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Checkov
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        run: pip install checkov --quiet

      - name: Claude Code — auto-fix
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read

          # SAFEGUARD 3 + 4: attempt counter and error class blocklist
          prompt: |
            A Terraform CI job just failed on PR #${{ github.event.workflow_run.pull_requests[0].number }}.
            This is attempt number ${{ github.run_attempt }}.

            STOP IMMEDIATELY and post a [needs-human] comment if the logs contain ANY of these:
              - AccessDenied, UnauthorizedOperation, 403, 401
              - "provider version", "unsupported argument", "deprecated argument"
              - "quota exceeded", "LimitExceeded", "Throttling", "TooManyRequests"
              - "connection refused", "network timeout"

            If attempt >= 2 and the same error recurs, post [needs-human] and add label "no-autofix". STOP.

            For fixable failures (fmt, validate, tflint, checkov):
            1. Read the CI logs to identify the exact failure
            2. Fix only the specific file and line that failed
            3. Run the check locally to confirm the fix works
            4. Commit: "fix: [auto] <what-was-fixed>"
            5. Post a brief PR comment explaining what was fixed

            Never run terraform apply or destroy.
            Never modify backend.tf, terraform/bootstrap/, or .github/workflows/.
            Never push to main or dev.

          claude_args: |
            --max-turns 10
            --allowedTools "Bash(terraform:*),Bash(tflint:*),Bash(checkov:*),Bash(git:*),Bash(gh:*),Edit,Replace,View,GlobTool,GrepTool,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,mcp__github_comment__*"
            --disallowedTools "AskUserQuestion,WebSearch,WebFetch,CronCreate,CronDelete,CronList,RemoteTrigger,NotebookEdit"