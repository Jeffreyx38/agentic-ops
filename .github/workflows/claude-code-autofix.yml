name: Claude Code — auto-fix CI failures

# Fires when Terraform CI fails on a PR.
# Claude reads the logs, diagnoses root cause, pushes a fix. 
#
# SAFEGUARD LAYERS:
#   1. --max-turns 10        hard cap per session
#   2. concurrency lock      one session per PR, cancel-in-progress
#   3. attempt counter       stops after attempt 2, escalates to human
#   4. error class blocklist unfixable errors trigger escalation, not a fix

on:
  workflow_run:
    workflows: ["Terraform CI"]
    types: [completed]

# SAFEGUARD 2: one auto-fix session per PR — cancel if one is already running
concurrency:
  group: claude-autofix-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  auto-fix:
    name: Auto-fix CI failure
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] != null

    steps:
      # SAFEGUARD: skip if no-autofix label is set on the PR
      - name: Check no-autofix label
        id: check-label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.workflow_run.pull_requests[0].number }}"
          LABELS=$(gh pr view "$PR_NUM" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "no-autofix"; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: no-autofix label found on PR #$PR_NUM"
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      # SAFEGUARD: skip if [skip-autofix] in commit message
      - name: Check skip-autofix commit message
        id: check-commit
        if: steps.check-label.outputs.SKIP != 'true'
        run: |
          COMMIT_MSG="${{ github.event.workflow_run.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -q "\[skip-autofix\]"; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: [skip-autofix] found in commit message"
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Terraform
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Setup TFLint
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint plugins
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Checkov
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        run: pip install checkov --quiet

      - name: Claude Code — auto-fix
        if: steps.check-label.outputs.SKIP != 'true' && steps.check-commit.outputs.SKIP != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read

          # SAFEGUARD 3 + 4: attempt counter and error class blocklist
          prompt: |
            A Terraform CI job just failed on PR #${{ github.event.workflow_run.pull_requests[0].number }}.
            This is attempt number ${{ github.run_attempt }}.

            ═══════════════════════════════════════════════════════
            SAFEGUARD — READ BEFORE DOING ANYTHING
            ═══════════════════════════════════════════════════════

            Step 1: Read the failed CI job logs.

            Step 2: Check for UNFIXABLE error patterns.
            If ANY of these appear, escalate — never attempt a code fix:

              • AccessDenied, UnauthorizedOperation, 403, 401
                → IAM / credentials issue. Not a code problem.

              • "provider version", "unsupported argument", "deprecated argument"
                → Provider breaking change. Requires human decision.

              • "quota exceeded", "LimitExceeded", "Throttling", "TooManyRequests"
                → AWS account limit. No code change will fix this.

              • "context deadline exceeded", "connection refused", "network timeout"
                → Network / infra issue. Not a code problem.

              • "ANTHROPIC_API_KEY", "authentication", "invalid API key"
                → Missing secret. Not a code problem.

            If unfixable:
              1. Post PR comment: "🚨 [needs-human] Auto-fix stopped: <error type>.
                 Evidence: <log snippet max 3 lines>.
                 Required action: <what a human must do>."
              2. Run: gh pr edit ${{ github.event.workflow_run.pull_requests[0].number }} --add-label "no-autofix"
              3. STOP. No code changes.

            Step 3: Check attempt count.
            Attempt = ${{ github.run_attempt }}.
            If attempt >= 2 and the same error recurs:
              - Post: "🚨 [needs-human] Auto-fix attempt 2 failed. Human review required."
              - Run: gh pr edit ${{ github.event.workflow_run.pull_requests[0].number }} --add-label "no-autofix"
              - STOP.

            ═══════════════════════════════════════════════════════
            FIXABLE FAILURES — only proceed if checks above pass
            ═══════════════════════════════════════════════════════

            terraform fmt:
              Fix:   terraform fmt -recursive terraform/
              Check: terraform fmt -check -recursive terraform/
              Commit: "fix: [auto] terraform fmt"

            terraform validate:
              Fix only the specific file and line from the error.
              Check: cd terraform/modules/<n> && terraform init -backend=false && terraform validate
              Commit: "fix: [auto] terraform validate — <what was wrong>"

            tflint:
              Fix only the rule shown in the log.
              Check: tflint --recursive terraform/
              Commit: "fix: [auto] tflint — <rule name>"

            checkov:
              Fix the specific check ID from the log. Never add to skip list.
              Check: checkov --directory terraform/ --framework terraform --compact
              Commit: "fix: [auto] checkov <check-id> — <resource>"

            After a fix: post a brief PR comment explaining what failed and what was fixed.

            ═══════════════════════════════════════════════════════
            ABSOLUTE RULES
            ═══════════════════════════════════════════════════════
            Never run terraform apply, terraform destroy, or terraform import.
            Never modify backend.tf, terraform/bootstrap/, or .github/workflows/.
            Never push to main or dev.
            Never add checks to .checkov.yaml skip list.
            If unsure, escalate — do not guess.

          # SAFEGUARD 1: 10-turn hard cap per session
          claude_args: |
            --max-turns 10
            --allowedTools "Bash(terraform:*),Bash(tflint:*),Bash(checkov:*),Bash(git:*),Bash(gh:*),Edit,Replace,View,GlobTool,GrepTool,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log"
            --mcp-config '{"mcpServers":{"terraform":{"command":"npx","args":["-y","@hashicorp/terraform-mcp-server"],"env":{}}}}'
